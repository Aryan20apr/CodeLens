# =============================================================================
# Redis production configuration (CodeLens)
# Values that vary per environment (password, maxmemory, bind host) are passed
# via CLI flags from docker-compose so this file stays environment-agnostic.
# =============================================================================

# ---- Network ----------------------------------------------------------------
# Bind to all interfaces inside the container; the container is isolated on a
# private docker network and only exposed via the compose `ports` mapping.
bind 0.0.0.0 -::1
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ---- General ----------------------------------------------------------------
daemonize no
loglevel notice
databases 16
always-show-logo no
set-proc-title yes

# ---- Snapshotting (RDB) -----------------------------------------------------
# Save on: 1h if >=1 change, 5m if >=100, 1m if >=10000.
save 3600 1
save 300 100
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ---- Append-Only File (AOF) -------------------------------------------------
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ---- Slow log ---------------------------------------------------------------
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---- Latency monitor --------------------------------------------------------
latency-monitor-threshold 100

# ---- Client / connection limits --------------------------------------------
maxclients 10000

# ---- Security ---------------------------------------------------------------
# Disable / rename dangerous commands. FLUSHALL/FLUSHDB/KEYS are blocked
# entirely; CONFIG is renamed to a non-guessable string for ops use.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command KEYS ""
rename-command DEBUG ""
rename-command CONFIG "CONFIG_b3a17c5e9d2f4a18"

# ---- Lazy freeing (non-blocking deletes) ------------------------------------
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# ---- Threaded I/O -----------------------------------------------------------
# Single IO thread model inside Docker (especially Desktop / ARM): extra
# io-threads have correlated with SIGSEGV in some Redis + libc combinations.
io-threads 1
io-threads-do-reads no

# ---- Defrag (active) --------------------------------------------------------
# Off for container stability; enable on dedicated Linux hosts with spare CPU.
activedefrag no
# When enabling activedefrag on bare metal, tune e.g.:
# active-defrag-ignore-bytes 100mb
# active-defrag-threshold-lower 10
# active-defrag-threshold-upper 100
# active-defrag-cycle-min 1
# active-defrag-cycle-max 25
